<div class="container mt-2 mb-5">
    <div class="row">
        <div class="col text-center">
            <h1 class="org display-2 fw-bold p-3">{{ org }}</h1>
        </div>
    </div>

    {% for output in outputs %}
    <div class="row mb-4">
        <div class="col-3"></div>
        <div class="col border-start border-3 border-primary">
            <h5>
                <a href="{{ output.html }}">
                    {{ "{:,}".format(output.count) }} {{ output.name }}
                </a>
            </h5>

            <div class="row">
                <div class="col"></div>
                <div class="col text-end">
                    <a href="{{ output.csv }}"><span class="badge badge-pill bg-secondary">{{ output.csv }}</span></a>
                </div>
            </div>
        </div>
        <div class="col-3"></div>
    </div>
    {% endfor %}
</div>
