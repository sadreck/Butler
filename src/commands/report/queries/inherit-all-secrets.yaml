version: '2.0'
name: 'Usages of secrets: inherit'
description: 'Usage of secrets: inherit, where all secrets are passed to child workflows'
filename: 'usage-secrets-inherit'
group: 'secrets'
sql: |
  SELECT
  	o.name AS org_name,
  	r.name AS repo_name,
  	REPLACE(w.path, '.github/workflows/', '') AS workflow_path,
  	j.shortname AS job_name,
  	(CASE WHEN r.visibility = 1 THEN 'public' WHEN r.visibility = 2 THEN 'private' ELSE 'unknown' END) AS visibility,
  	r.archive AS archived,
  	r.fork AS forked,
  	CONCAT('https://github.com/', o.name, '/', r.name, '/blob/', r.ref_commit, '/', w.path) AS workflow_url,
  	CONCAT('https://github.com/', o.name, '/', r.name) AS repo_url
  FROM job_data jd
  JOIN jobs j ON j.id = jd.job_id
  JOIN workflows w ON w.id = j.workflow_id
  JOIN repositories r ON r.id = w.repo_id
  JOIN organisations o ON o.id = r.org_id
  WHERE
  	jd.property = 'secrets'
  	AND jd.value = 'inherit'
  	AND o.id = :org
  ORDER BY 1, 2, 3, 4
columns:
  org_name: hide
  workflow_url: hide
  repo_url: hide

  repo_name:
    label: 'Repository'
    type: 'link'
    link: 'repo_url'
    filters:
      column_control_alias: 'list'
  workflow_path:
    label: 'Workflow'
    type: 'link'
    link: 'workflow_url'
  job_name:
    label: 'Job'
  visibility:
    label: 'Visibility'
    filters:
      column_control_alias: 'list-no-search'
  archived:
    label: 'Archived'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
  forked:
    label: 'Forked'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
