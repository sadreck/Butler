version: "1.1"
name: "Variables & Secrets"
filename: "variables-and-secrets"
sql: |
  SELECT
  	r.name AS repo_name,
  	REPLACE(w.path, '.github/workflows/', '') AS workflow_path,
  	(CASE
  		WHEN w.type = 1 THEN 'workflow'
  		WHEN w.type = 2 THEN 'action'
  		WHEN w.type = 3 THEN 'docker'
  		ELSE 'unknown'
  	END) AS workflow_type,
  	variable_data.variable AS variable_name,
  	variable_data.type AS variable_type,
  	variable_data.location AS variable_location,
  	(CASE
  		WHEN r.visibility = 1 THEN 'public'
  		WHEN r.visibility = 2 THEN 'private'
  		ELSE 'unknown'
  	END) AS visibility,
  	r.archive AS archived,
  	r.fork AS forked,
  	(CASE WHEN reusable_workflows.workflow_id IS NULL THEN 0 ELSE 1 END) AS reusable_workflow,
  	CONCAT('https://github.com/', o.name, '/', r.name, '/blob/', r.ref, '/', w.path) AS workflow_url,
  	CONCAT('https://github.com/', o.name, '/', r.name) AS repo_url
  FROM (
  	SELECT
  		REPLACE(REPLACE(v.name, 'secrets.', ''), 'vars.', '') AS variable,
  		COALESCE(w.id, w2.id, w3.id) AS workflow_id,
  		(CASE
  			WHEN r.id IS NOT NULL THEN 'workflow'
  			WHEN r2.id IS NOT NULL THEN 'job'
  			WHEN r3.id IS NOT NULL THEN 'step'
  			ELSE 'unknown'
  		END) AS location,
  		(CASE
  			WHEN v.name LIKE 'secrets.%' THEN 'secret'
  			ELSE 'variable'
  		END) AS type
  	FROM variables v

  	LEFT JOIN workflow_data wd ON wd.id = v.workflow_data_id
  	LEFT JOIN workflows w ON w.id = wd.workflow_id
  	LEFT JOIN repositories r ON r.id = w.repo_id
  	LEFT JOIN organisations o ON o.id = r.org_id

  	LEFT JOIN job_data jd ON jd.id = v.job_data_id
  	LEFT JOIN jobs j2 ON j2.id = jd.job_id
  	LEFT JOIN workflows w2 ON w2.id = j2.workflow_id
  	LEFT JOIN repositories r2 ON r2.id = w2.repo_id
  	LEFT JOIN organisations o2 ON o2.id = r2.org_id

  	LEFT JOIN step_data sd ON sd.id = v.step_data_id
  	LEFT JOIN steps s3 ON s3.id = sd.step_id
  	LEFT JOIN jobs j3 ON j3.id = s3.job_id
  	LEFT JOIN workflows w3 ON w3.id = j3.workflow_id
  	LEFT JOIN repositories r3 ON r3.id = w3.repo_id
  	LEFT JOIN organisations o3 ON o3.id = r3.org_id

  	WHERE
  		(v.name LIKE 'secrets.%' OR v.name LIKE 'vars.%')
  		AND (UPPER(v.name) NOT LIKE '%.GITHUB_TOKEN')

  	GROUP BY 1, 2, 3, 4
  ) variable_data
  JOIN workflows w ON w.id = variable_data.workflow_id
  JOIN repositories r ON r.id = w.repo_id
  JOIN organisations o ON o.id = r.org_id
  LEFT JOIN (
  	SELECT
  		wd.workflow_id
  	FROM workflow_data wd
  	WHERE
  		wd.property = 'on'
  		AND wd.value = 'workflow_call'
  ) reusable_workflows ON reusable_workflows.workflow_id = w.id
  WHERE
  	o.id = :org
columns:
  workflow_url: hide
  repo_url: hide

  repo_name:
    label: 'Repository'
    type: 'link'
    link: 'repo_url'
    filters:
      column_control: "['order', [{ extend: 'searchList' }]]"
  workflow_path:
    label: 'Workflow'
    type: 'link'
    link: 'workflow_url'
    filters:
      column_control: "[]"
  workflow_type:
    label: 'Type'
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  variable_name:
    label: 'Variable'
  variable_type:
    label: 'Source'
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  variable_location:
    label: 'Location'
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  visibility:
    label: 'Visibility'
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  archived:
    label: 'Archived'
    align: 'text-center'
    type: 'icon'
    format:
      icon_true: 'fa-solid fa-circle-check'
      icon_false: 'fa-solid fa-circle-xmark'
      style_true: 'text-warning'
      style_false: ''
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  forked:
    label: 'Forked'
    align: 'text-center'
    type: 'icon'
    format:
      icon_true: 'fa-solid fa-circle-check'
      icon_false: 'fa-solid fa-circle-xmark'
      style_true: 'text-warning'
      style_false: ''
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
  reusable_workflow:
    label: 'Reusable'
    align: 'text-center'
    type: 'icon'
    format:
      icon_true: 'fa-solid fa-circle-check'
      icon_false: 'fa-solid fa-circle-xmark'
      style_true: 'text-primary'
      style_false: ''
    filters:
      column_control: "['order', [{ extend: 'searchList', search: false }]]"
