version: "1.1"
name: "Third-Party Actions"
filename: "third-party-actions"
sql: |
  SELECT
    o2.name AS third_party_org_name,
    r2.name AS third_party_repo_name,
    r2.ref AS third_party_ref,
  	CONCAT(o2.name, '/', r2.name, '@', r2.ref) AS third_party_repo_fullname,
  	(CASE WHEN r2.ref_type = 1 THEN 'branch' WHEN r2.ref_type = 2 THEN 'tag' WHEN r2.ref_type = 3 THEN 'commit' ELSE 'unknown' END) AS third_party_ref_type,
  	CONCAT('https://github.com/', o2.name, '/', r2.name, '/blob/', r2.ref, '/', w2.path) AS third_party_url,
  	r2.archive AS third_party_archived,
    r2.fork AS third_parth_forked,
  	r2.stars AS third_party_stars,

  	r.name AS repo_name,
  	REPLACE(w.path, '.github/workflows/', '') AS workflow_path,
    (CASE WHEN w.type = 1 THEN 'workflow' WHEN w.type = 2 THEN 'action' WHEN w.type = 3 THEN 'docker' ELSE 'unknown' END) AS workflow_type,
  	(CASE WHEN r.visibility = 1 THEN 'public' WHEN r.visibility = 2 THEN 'private' ELSE 'unknown' END) AS visibility,
    r.archive AS archived,
    r.fork AS forked,
    (CASE WHEN reusable_workflows.workflow_id IS NULL THEN 0 ELSE 1 END) AS reusable_workflow,
    CONCAT('https://github.com/', o.name, '/', r.name, '/blob/', r.ref, '/', w.path) AS workflow_url,
    CONCAT('https://github.com/', o.name, '/', r.name) AS repo_url
  FROM workflows w
  JOIN repositories r ON r.id = w.repo_id
  JOIN organisations o ON o.id = r.org_id
  JOIN workflow_tree wt ON wt.parent_id = w.id
  JOIN workflows w2 ON w2.id = wt.child_id
  JOIN repositories r2 ON r2.id = w2.repo_id
  JOIN organisations o2 ON o2.id = r2.org_id
  LEFT JOIN (
    SELECT wd.workflow_id
    FROM workflow_data wd
    WHERE wd.property = 'on' AND wd.value = 'workflow_call'
  ) reusable_workflows ON reusable_workflows.workflow_id = w.id
  WHERE
  	o.id = :org
  	AND o2.id != :org
  ORDER BY 1, 2
columns:
  third_party_url: hide
  workflow_url: hide
  repo_url: hide
  third_party_org_name: hide
  third_party_repo_name: hide
  third_party_ref: hide

  third_party_repo_fullname:
    label: 'Third Party Action'
    type: 'link'
    link: 'third_party_url'
  third_party_ref_type:
    label: 'Type'
    filters:
      column_control_alias: 'list-no-search'
  third_party_archived:
    label: 'Archived'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
  third_parth_forked:
    label: 'Forked'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
  third_party_stars:
    label: 'Stars'
    filters:
      column_control: "['order']"
  repo_name:
    label: 'Repository'
    type: 'link'
    link: 'repo_url'
    filters:
      column_control_alias: 'list'
  workflow_path:
    label: 'Workflow'
    type: 'link'
    link: 'workflow_url'
    filters:
      column_control: "[]"
  workflow_type:
    label: 'Type'
    filters:
      column_control_alias: 'list-no-search'
  visibility:
    label: 'Visibility'
    filters:
      column_control_alias: 'list-no-search'
  archived:
    label: 'Archived'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
  forked:
    label: 'Forked'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-warning'
    filters:
      column_control_alias: 'list-no-search'
  reusable_workflow:
    label: 'Reusable'
    align: 'text-center'
    type: 'icon'
    format:
      style_true: 'text-primary'
    filters:
      column_control_alias: 'list-no-search'
